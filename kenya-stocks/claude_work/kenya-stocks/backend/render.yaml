services:
  - type: web
    name: kenya-stocks-api
    runtime: python
    rootDir: kenya-stocks/claude_work/kenya-stocks/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
    autoDeploy: true
